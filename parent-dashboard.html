<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家長專區 - 補習班管理系統</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; }
    .navbar { background: linear-gradient(135deg, #2c3e50, #f39c12); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .btn-logout { background: rgba(255,255,255,0.2); border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; color: white; }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .card { background: white; border-radius: 15px; padding: 25px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .card-icon { font-size: 48px; color: #f39c12; margin-bottom: 15px; }
    .card h3 { margin-bottom: 10px; }
    .card p { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <div class="navbar">
    <h2><i class="fas fa-user-friends"></i> 家長專區</h2>
    <button class="btn-logout" onclick="logout()">登出</button>
  </div>
  <div class="container">
    <div class="dashboard-grid">
      <div class="card" onclick="navigate('parent-leave.html')">
        <div class="card-icon"><i class="fas fa-calendar-times"></i></div>
        <h3>📋 請假申請</h3><p>為孩子申請請假</p>
      </div>
      <div class="card" onclick="navigate('parent-attendance.html')">
        <div class="card-icon"><i class="fas fa-clipboard-check"></i></div>
        <h3>📊 出勤查詢</h3><p>查看到課狀況</p>
      </div>
      <div class="card" onclick="navigate('parent-grades.html')">
        <div class="card-icon"><i class="fas fa-chart-line"></i></div>
        <h3>📈 成績查詢</h3><p>查看考試成績</p>
      </div>
    </div>
  </div>
  <script>
    function navigate(page) { window.location.href = page; }
    function logout() { localStorage.clear(); window.location.href = 'index.html'; }
  </script>
</body>
</html>
