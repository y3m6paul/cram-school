<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成績查詢 - 家長專區</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; }
    .navbar { background: linear-gradient(135deg, #2c3e50, #f39c12); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
    .btn-back { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .form-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { flex: 1; min-width: 150px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
    .form-control { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; }
    .btn { padding: 10px 20px; background: #f39c12; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .table-container { background: white; border-radius: 15px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    th { background: #f39c12; color: white; padding: 12px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    .score-high { color: #27ae60; font-weight: bold; }
    .score-medium { color: #f39c12; font-weight: bold; }
    .score-low { color: #e74c3c; font-weight: bold; }
  </style>
</head>
<body>
  <div class="navbar">
    <h2><i class="fas fa-chart-line"></i> 成績查詢</h2>
    <button class="btn-back" onclick="goBack()">← 返回</button>
  </div>
  <div class="container">
    <div class="form-card">
      <div class="form-group"><label>學生姓名</label><input type="text" id="studentName" class="form-control" placeholder="請輸入學生姓名"></div>
      <button class="btn" onclick="searchGrades()">查詢</button>
    </div>
    <div class="table-container"><table><thead><tr><th>考試名稱</th><th>科目</th><th>分數</th><th>等級</th></tr></thead><tbody id="gradeList"><tr><td colspan="4">請輸入學生姓名查詢</td></tr></tbody></table></div>
  </div>
  <script src="js/api.js"></script>
  <script>
    async function searchGrades() {
      const studentName = document.getElementById('studentName').value;
      if (!studentName) { alert('請輸入學生姓名'); return; }
      const response = await api.get({ action: 'getGrades', studentName: studentName });
      const tbody = document.getElementById('gradeList');
      if (response.success && response.grades && response.grades.length > 0) {
        tbody.innerHTML = response.grades.map(g => {
          let scoreClass = 'score-medium';
          if (g.score >= 85) scoreClass = 'score-high';
          else if (g.score < 60) scoreClass = 'score-low';
          return `<tr><td>${g.examName}</td><td>${g.subject}</td><td class="${scoreClass}">${g.score}</td><td>${g.level || ''}</td></tr>`;
        }).join('');
      } else { tbody.innerHTML = '<tr><td colspan="4">查無成績記錄</td></tr>'; }
    }
    function goBack() { window.location.href = 'parent-dashboard.html'; }
  </script>
</body>
</html>
