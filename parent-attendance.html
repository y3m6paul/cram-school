<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出勤查詢 - 家長專區</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; }
    .navbar { background: linear-gradient(135deg, #2c3e50, #f39c12); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
    .btn-back { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .form-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { flex: 1; min-width: 150px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
    .form-control { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; }
    .btn { padding: 10px 20px; background: #f39c12; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .table-container { background: white; border-radius: 15px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    th { background: #f39c12; color: white; padding: 12px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    .status-present { background: #d4edda; color: #155724; padding: 4px 8px; border-radius: 20px; display: inline-block; }
    .status-absent { background: #f8d7da; color: #721c24; padding: 4px 8px; border-radius: 20px; display: inline-block; }
    .status-leave { background: #fff3cd; color: #856404; padding: 4px 8px; border-radius: 20px; display: inline-block; }
  </style>
</head>
<body>
  <div class="navbar">
    <h2><i class="fas fa-clipboard-check"></i> 出勤查詢</h2>
    <button class="btn-back" onclick="goBack()">← 返回</button>
  </div>
  <div class="container">
    <div class="form-card">
      <div class="form-group"><label>學生姓名</label><input type="text" id="studentName" class="form-control" placeholder="請輸入學生姓名"></div>
      <button class="btn" onclick="searchAttendance()">查詢</button>
    </div>
    <div class="table-container"><table><thead><tr><th>日期</th><th>狀態</th><th>備註</th></tr></thead><tbody id="attendanceList"><tr><td colspan="3">請輸入學生姓名查詢</td></tr></tbody></table></div>
  </div>
  <script src="js/api.js"></script>
  <script>
    async function searchAttendance() {
      const studentName = document.getElementById('studentName').value;
      if (!studentName) { alert('請輸入學生姓名'); return; }
      const response = await api.getAttendance(studentName);
      const tbody = document.getElementById('attendanceList');
      if (response.success && response.records && response.records.length > 0) {
        tbody.innerHTML = response.records.map(r => `<tr><td>${r.date}</td><td><span class="status-${r.status === '已到班' ? 'present' : r.status === '未到班' ? 'absent' : 'leave'}">${r.status}</span></td><td>${r.note || ''}</td></tr>`).join('');
      } else { tbody.innerHTML = '<tr><td colspan="3">查無出勤記錄</td></tr>'; }
    }
    function goBack() { window.location.href = 'parent-dashboard.html'; }
  </script>
</body>
</html>
