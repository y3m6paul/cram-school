<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理員管理 - 補習班管理系統</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; }
    .navbar { background: linear-gradient(135deg, #2c3e50, #e74c3c); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
    .btn-back { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .table-container { background: white; border-radius: 15px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th { background: #e74c3c; color: white; padding: 12px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    .message { padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; }
    .message.success { background: #d4edda; color: #155724; display: block; }
    .message.error { background: #f8d7da; color: #721c24; display: block; }
  </style>
</head>
<body>
  <div class="navbar">
    <h2><i class="fas fa-user-shield"></i> 管理員管理</h2>
    <button class="btn-back" onclick="goBack()">← 返回</button>
  </div>
  <div class="container">
    <div id="message" class="message"></div>
    <div class="table-container"><table><thead><tr><th>ID</th><th>姓名</th><th>職稱</th><th>電話</th><th>Email</th></tr></thead><tbody id="adminList"><tr><td colspan="5">載入中...</td></tr></tbody></table></div>
  </div>
  <script src="js/api.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const userType = urlParams.get('userType') || localStorage.getItem('userType') || 'teacher';
    
    async function loadAdmins() {
      const response = await api.get({ action: 'getAdmins' });
      if (response.success && response.admins) {
        document.getElementById('adminList').innerHTML = response.admins.map(a => `<tr><td>${a.id}</td><td>${a.name}</td><td>${a.role}</td><td>${a.phone}</td><td>${a.email}</td></tr>`).join('');
        if (response.admins.length === 0) document.getElementById('adminList').innerHTML = '<tr><td colspan="5">無管理員資料</td></tr>';
      } else { showMessage('載入失敗', 'error'); }
    }
    
    function showMessage(msg, type) { const msgDiv = document.getElementById('message'); msgDiv.textContent = msg; msgDiv.className = 'message ' + type; setTimeout(() => msgDiv.style.display = 'none', 3000); }
    function goBack() { window.location.href = `dashboard.html?userType=${userType}`; }
    loadAdmins();
  </script>
</body>
</html>
